name: Update Data and Deploy

on:
  schedule:
    - cron: '0 23 * * *' # Runs at 23:00 UTC (6 PM EST) daily
  workflow_dispatch:      # Allows manual "Run Now" button

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # --- ADDED TO FIX THE WARNING ---
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

    steps:
      # 1. Get your code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install Python Dependencies
        run: pip install pandas pandas_datareader requests

      - name: Fetch FRED Data
        run: python scripts/fetch_data.py

      # 3. Commit the new data.json
      - name: Commit Data Update
        run: |
          git config --global user.name 'LiquidityBot'
          git config --global user.email 'bot@noreply.github.com'
          git add public/data.json
          git commit -m "Auto-update liquidity data" || exit 0
          git push

      # 4. Build the React Website
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # <-- CHANGED FROM 20 TO 24

      - name: Install NPM Packages
        run: npm install

      - name: Build Project
        run: npm run build

      # 5. Deploy to GitHub Pages
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
